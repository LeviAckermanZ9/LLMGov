# Grafana — Auto-provision dashboard folder

apiVersion: 1

providers:
  - name: LLMGov
    orgId: 1
    folder: LLMGov
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
