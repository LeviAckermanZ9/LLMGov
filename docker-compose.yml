# ──────────────────────────────────────────────────────────────
# LLMGov — Docker Compose
# ──────────────────────────────────────────────────────────────
# Usage:
#   Full stack (grading/demo):  docker compose up
#   Infra-only (local dev):    docker compose up redis clickhouse
#
# "Full stack" is the default because Milestone 1 grading depends
# on `docker compose up` bringing up everything cleanly.
# For local development, run infra-only and start the gateway
# with `uvicorn app.main:app --reload` for hot-reload.
#
# Ollama added in Week 2 when the fallback provider is wired.
# ──────────────────────────────────────────────────────────────

services:
  # ── Cache, Auth, Rate Limiting, Embedding Store ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Analytical Telemetry & Audit Log ──
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=llmgov_dev
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "llmgov_dev", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── LLMGov Gateway ──
  gateway:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_PASSWORD=llmgov_dev
    restart: unless-stopped

  # ── Fallback Provider (Ollama) ──
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  ch_data:
  ollama_data:

